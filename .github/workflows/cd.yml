name: Build App release

on:
  workflow_dispatch:
  push:
    branches:
      - 'test/**'
    paths-ignore:
      - '**.md'

env:
  gradleFlags: --parallel --stacktrace --no-configuration-cache --no-daemon
  ANDROID_SDK_ROOT: /usr/lib/android-sdk
  API_TOKEN: ${{ secrets.API_TOKEN }}
  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/android-setup

      - name: Extract and validate version from branch
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          echo "Current branch: $BRANCH_NAME"
          
          if [[ "$BRANCH_NAME" =~ (v\.[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION_WITH_PREFIX="${BASH_REMATCH[1]}"
            VERSION_NAME="${VERSION_WITH_PREFIX#v.}"
          
            echo "Detected version: $VERSION_NAME"
          
            echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
            VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          
            echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          else
            echo "❌ Branch must end with v.X.Y.Z"
            exit 1
          fi

      - name: Extract version from branch
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          VERSION_NAME=$(echo "$BRANCH_NAME" | sed 's/^v\.//')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
            
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Decode Keystore
        run: echo "${{ secrets.JKS_KS }}" | base64 -d > app/release.jks

      - name: Build Release AAB
        run: ./gradlew bundleRelease \
         -PversionCode=${{ env.VERSION_CODE }} \
         -PversionName=${{ env.VERSION_NAME }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.JKS_KS_PASS }}
          KEY_ALIAS: ${{ secrets.JKS_ALIAS }}
          KEY_PASSWORD: ${{ secrets.JKS_KEY_PASS }}

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_PACKAGE_NAME }}
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal



