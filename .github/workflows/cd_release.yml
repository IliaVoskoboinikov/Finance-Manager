name: Build App release

on:
  workflow_dispatch:
  push:
    branches:
      - 'releases/**'
    paths-ignore:
      - '**.md'

env:
  gradleFlags: --parallel --stacktrace --no-configuration-cache --no-daemon
  ANDROID_SDK_ROOT: /usr/lib/android-sdk
  API_TOKEN: ${{ secrets.API_TOKEN }}
  GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

jobs:
  validate-version:
    name: Validate and extract version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.extract.outputs.version_name }}
      version_code: ${{ steps.extract.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract version from branch
        id: extract
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          echo "Branch: $BRANCH_NAME"

          if [[ "$BRANCH_NAME" =~ (v\.[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION_WITH_PREFIX="${BASH_REMATCH[1]}"
            VERSION_NAME="${VERSION_WITH_PREFIX#v.}"

            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
            VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))

            echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
            echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

            echo "Detected version: $VERSION_NAME ($VERSION_CODE)"
          else
            echo "❌ Branch must end with v.X.Y.Z"
            exit 1
          fi

  build-app:
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/android-setup
      - name: Build Release Bundle
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ needs.validate-version.outputs.version_code }} \
            -PversionName=${{ needs.validate-version.outputs.version_name }} \
            $GRADLE_FLAGS
      - name: Generate build time report
        uses: ./.github/actions/build-time-report
        with:
          file: app/build/reports/buildTimeTracker/build.csv
          output-file: buildTime.csv
      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned
          path: app/build/outputs/apk/release/app-release.apk
      - name: Upload time report
        uses: actions/upload-artifact@v4
        with:
          name: buildTime.csv
          path: buildTime.csv

  sign-app:
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Download apk
        uses: actions/download-artifact@v4
        with:
          name: app-unsigned
      - name: Install android cli tools
        shell: bash
        run: |
          set -e
          sudo mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          sudo curl https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip -o android-tools.zip
          sudo unzip android-tools.zip
          sudo bash -c "yes | $ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses"
          sudo $ANDROID_SDK_ROOT/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;35.0.0"
      - name: Zipalign apk
        shell: bash
        run: |
          set -e
          $ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign -v -p 4 app-release.apk app-aligned.apk
      - name: Sign apk
        shell: bash
        run: |
          set -e
          echo ${{ secrets.JKS_KS }} | base64 -d > release.jks
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign --ks release.jks --in app-aligned.apk --out app-signed.apk --key-pass pass:${{ secrets.JKS_KEY_PASS }} --ks-pass pass:${{ secrets.JKS_KS_PASS }} --ks-key-alias ${{ secrets.JKS_ALIAS }}
      - name: Verify signature
        shell: bash
        run: |
          set -e
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner verify app-signed.apk
      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: app-signed
          path: app-signed.apk

  report-telegram:
    runs-on: ubuntu-latest
    needs: sign-app
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download apk
        uses: actions/download-artifact@v4
        with:
          name:  app-signed
      - name: Get app version
        id: get_version
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName | tail -n1)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
      - name: Report apk file
        uses: ./.github/actions/send-file-tg
        with:
          tg-token: ${{ secrets.TG_TOKEN }}
          tg-chat: ${{ secrets.TG_CHAT_BUILD }}
          thread-id: ${{ secrets.TG_THREAD_RELEASE }}
          file:  app-signed.apk
          text: |
            🚀 *Release Build*

            📦 Version: ${{ env.VERSION_NAME }}
            🌿 Branch: ${{ github.ref_name }}
            ✏️ Commit: ${{ github.event.head_commit.message }}
            🔗 [Open CI Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

  build-aab:
    name: Build signed AAB
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup environment
        uses: ./.github/actions/android-setup
      - name: Decode Keystore
        run: echo "${{ secrets.JKS_KS }}" | base64 -d > app/release.jks
      - name: Build Release Bundle
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ needs.validate-version.outputs.version_code }} \
            -PversionName=${{ needs.validate-version.outputs.version_name }} \
            $GRADLE_FLAGS
        env:
          KEYSTORE_PASSWORD: ${{ secrets.JKS_KS_PASS }}
          KEY_ALIAS: ${{ secrets.JKS_ALIAS }}
          KEY_PASSWORD: ${{ secrets.JKS_KEY_PASS }}
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

  publish-play:
    name: Publish to Play Internal
    runs-on: ubuntu-latest
    needs: build-aab
    steps:
      - name: Download signed aab
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_PACKAGE_NAME }}
          releaseFiles: app-release.aab
          track: internal
          status: draftt
